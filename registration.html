<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
            body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .navbar { background-color: #2c3e50; }
    .navbar-brand, .nav-link { color: #ecf0f1 !important; }
    footer { background-color: #2c3e50; color: white; padding: 20px 0; margin-top: 50px; }
    .reg-form { max-width: 600px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
    .brand-badge { display: inline-flex; align-items: center; justify-content: center; width: 2rem; height: 2rem; margin-right: 0.5rem; border-radius: 0.5rem; background: #cf0d78; color: #fff; font-size: 0.9rem; font-weight: bold;}
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg site-navbar sticky-top py-3">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <span class="brand-badge">S</span>
      Student Management System
    </a>
    <ul class="navbar-nav flex-column flex-lg-row ms-lg-auto align-items-lg-center gap-lg-2 mt-3 mt-lg-0">
      <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
      <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
      <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>

      <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
    </ul>
  </div>
</nav>
    <div class="container my-5">
        <div class="reg-form">
            <h2 class="text-center mb-4">Student Registration</h2>
            <form>
                <div class="mb-3"><label class="form-label">Full Name</label><input type="text" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">Email Address</label><input type="email" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">Phone Number</label><input type="tel" class="form-control"></div>
                <div class="mb-3">
                    <label class="form-label">Select Course</label>
                    <select class="form-select">
                        <option>Web Development</option>
                        <option>Data Science</option>
                        <option>App Development</option>
                        <option>Cyber Security</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label d-block">Gender</label>
                    <div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="gender" value="male"> <label class="form-check-label">Male</label></div>
                    <div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="gender" value="female"> <label class="form-check-label">Female</label></div>
                </div>
                <div class="mb-3">
                    <div class="form-check"><input class="form-check-input" type="checkbox" required> <label class="form-check-label">I agree to the terms and conditions</label></div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Register Now</button>
            </form>
        </div>
    </div>
    <footer>
        <div class="container text-center">
            <p>&copy; 2026 Student Management System. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
